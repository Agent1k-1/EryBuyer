# Описание плагина
# поддерживаемые версии
# 1.16-1.21+
# Зависимости
# Vault, PlaceholderAPI
# актионы
# [close] - закрытие меню
# [openmenu] - открытие меню
# [command] - выполнение команд
# [sound] произведение звуков
# Плагин разработан студией EryDev
message:
  no-item: "&fУ вас нет предмета &a%item_name%"
  successfully-buyer: "&fВы успешно продали &a%item_name% &fза &#4A90E2%prince%"
  auto-buyer: "&fВы продали скупщику &#FFFFFF%item_sell% &f штук баланс &a%vault_eco_balance%"
  auto-buyer-on: "&fАвто-скупщик %autobuyer_status%"
  auto-buyer-off: "&fАвто-скупщик %autobuyer_status%"
  no-permission: "&4У вас недостаточно прав"
  level-up: "&#4A90E2🎉 Вы достигли уровня &#FFFFFF%new_level%"
  level-info:
    - "&fВаша статистика уровней"
    - ""
    - "&fОбщая сумма продаж %buyer_total_earned%"
    - "&fТекущий уровень %buyer_current_level%"
    - "&fДо следующего уровня %buyer_required_amount%"
  config-reload: "&aПлагин успешно перезагружен ошибки не найдены"
placeholder:
  enable-autobuyer: "&aВключен ✓"
  disable-autobuyer: "&cВыключен ✗"
sound:
  sound_open_menu: BLOCK_CHEST_OPEN
  no-item-sound: ENTITY_VILLAGER_NO
  autobuyer-sound: BLOCK_NOTE_BLOCK_XYLOPHONE

